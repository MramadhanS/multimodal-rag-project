name: Multimodal RAG CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Pipa otomatis jalan setiap kali Anda melakukan git push

jobs:
  continuous_integration:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Syntax Linting Check
      run: python -m py_compile src/agent/brain.py app.py

  continuous_deployment:
    name: Build Docker & Push to Registry
    needs: continuous_integration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/insightmind-rag:latest
